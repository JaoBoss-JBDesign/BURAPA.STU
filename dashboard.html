<!DOCTYPE html>
<html>
<head>

<title>Teacher Dashboard</title>

<script src="script.js"></script>

<style>

}

.pending{

font-weight:bold;
}

button{
padding:6px 12px;
}

</style>

<body>

<h1>Teacher Dashboard</h1>

<div class="card">

</div>

</div>
