<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BURAPA STUDENT SYSTEM</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Prompt',sans-serif;
}

body{
min-height:100vh;
background:#f6f7fb;
display:flex;
flex-direction:column;
}

header{
background:#8b0000;
color:white;
text-align:center;
padding:28px 18px;
}

.logo{
width:85px;
margin-bottom:8px;
}

.system-name{
font-size:14px;
opacity:0.9;
}

.school-name{
font-size:22px;
font-weight:600;
margin-top:4px;
}

.term{
font-size:13px;
margin-top:6px;
opacity:0.9;
}

.main{
flex:1;
padding:20px;
display:flex;
align-items:center;
justify-content:center;
}

.card{
background:white;
width:100%;
max-width:420px;
padding:26px;
border-radius:16px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
text-align:center;
}

.card h2{
font-size:18px;
margin-bottom:18px;
color:#333;
}

.btn{
display:block;
width:100%;
padding:16px;
margin-top:12px;
border:none;
border-radius:12px;
font-size:15px;
font-weight:500;
cursor:pointer;
transition:0.2s;
}

.btn-teacher{
background:#8b0000;
color:white;
}

.btn-admin{
background:#f4c430;
color:#222;
}

.btn-manual{
background:#f1f3f7;
color:#333;
border:1px solid #ddd;
}

.btn:hover{
transform:translateY(-2px);
}

footer{
background:#222;
color:#ccc;
text-align:center;
padding:18px;
font-size:12px;
line-height:1.6;
}
</style>
</head>
<body>
<header>
  
<img src="burapa-logo.png" class="logo">

<div class="system-name">
ระบบบริหารจัดการสถิตินักเรียน
</div>

<div class="school-name">
โรงเรียนเทศบาลบูรพาอุบล
</div>

<div class="term" id="termDisplay"></div>
</header>

<div class="main">
<div class="card">
<h2>เลือกการเข้าใช้งาน</h2>

<button class="btn btn-teacher"
onclick="location.href='teacher-dashboard.html'">
👩‍🏫 สำหรับคุณครูประจำชั้น
</button>

<button class="btn btn-admin"
onclick="location.href='admin-login.html'">
👨‍💼 สำหรับผู้บริหาร / ผู้ดูแลระบบ
</button>

<button class="btn btn-manual"
onclick="openManual()">
📖 คู่มือการใช้งานระบบ
</button>
</div>
</div>
  
<footer>
ระบบบริหารจัดการสถิตินักเรียน (BURAPA.STU)
<br>
ภาคเรียนที่ <span id="termFooter"></span>
<br>
โรงเรียนเทศบาลบูรพาอุบล  
สำนักการศึกษา เทศบาลนครอุบลราชธานี
</footer>
  
<script>
function loadTerm(){
let term = localStorage.getItem("term")
let year = localStorage.getItem("year")
if(!term){
term="2"
year="2568"
}

document.getElementById("termDisplay").innerHTML=
"ภาคเรียนที่ "+term+" ปีการศึกษา "+year

document.getElementById("termFooter").innerHTML=
term+"/"+year
}

function openManual(){
window.open(
"รอใส่ลิ้งคู่มือ",
"_blank"
)
  
}

loadTerm()

</script>
</body>
</html>
