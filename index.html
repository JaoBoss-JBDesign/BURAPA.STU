<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BURAPA STUDENT SYSTEM</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Prompt',sans-serif;
}

/* BODY */

body{
min-height:100vh;
background:linear-gradient(180deg,#f6f7fb,#eef1f8);
display:flex;
flex-direction:column;
animation:fadeBody .6s ease;
}

body::before{
content:"";
position:fixed;
top:-200px;
right:-200px;
width:500px;
height:500px;
background:radial-gradient(circle,#ffb3b3,transparent);
opacity:.35;
z-index:-1;
}

@keyframes fadeBody{
from{opacity:0}
to{opacity:1}
}

/* HEADER */

header{

background:linear-gradient(
135deg,
#c1121f,
#e63946,
#ff6b6b
);

background-size:200% 200%;
animation:gradientMove 6s ease infinite;

color:white;
text-align:center;
padding:26px 16px 22px;

}

@keyframes gradientMove{

0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}

}

/* LOGO */

.logo{
width:140px;
margin-bottom:8px;
filter:drop-shadow(0 6px 12px rgba(0,0,0,.25));
transition:.35s;
}

.logo:hover{
transform:scale(1.05) rotate(-2deg);
}

/* TEXT */

.system-name{
font-size:14px;
opacity:.95;
}

.school-name{
font-size:32px;
font-weight:700;
margin-top:4px;
text-shadow:0 3px 8px rgba(0,0,0,.25);
}

.term{
font-size:13px;
margin-top:6px;
opacity:.95;
}

/* STATUS */

.status{
margin-top:10px;
font-size:13px;
background:#e8f7ec;
color:#2e7d32;
display:inline-block;
padding:6px 14px;
border-radius:20px;
}

/* MAIN */

.main{
flex:1;
display:flex;
align-items:center;
justify-content:center;
padding:30px 16px;
}

/* CARD */

.card{

width:100%;
max-width:520px;

background:rgba(255,255,255,.9);
backdrop-filter:blur(15px);

border-radius:22px;

padding:38px 28px;

box-shadow:
0 20px 50px rgba(0,0,0,.08),
0 5px 15px rgba(0,0,0,.05);

text-align:center;

border-top:5px solid #e63946;

animation:fadeIn .6s ease;

}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.card h2{
font-size:22px;
margin-bottom:26px;
color:#333;
}

/* BUTTON */

.btn{

display:flex;
align-items:center;
justify-content:center;
gap:10px;

width:100%;
padding:18px;

margin-top:14px;

border:none;
border-radius:14px;

font-size:16px;
font-weight:500;

cursor:pointer;

transition:.25s;

}

/* teacher */

.btn-teacher{

background:linear-gradient(
135deg,
#d62828,
#ff6b6b
);

color:white;

box-shadow:0 6px 18px rgba(214,40,40,.35);

}

/* admin */

.btn-admin{

background:linear-gradient(
135deg,
#f4c430,
#ffd166
);

color:#333;

box-shadow:0 6px 18px rgba(244,196,48,.35);

}

/* manual */

.btn-manual{

background:#eef1f6;
border:1px solid #dde2ea;
color:#333;

}

/* HOVER */

.btn:hover{

transform:translateY(-4px) scale(1.02);

box-shadow:0 15px 35px rgba(0,0,0,.2);

}

/* FOOTER */

footer{

background:linear-gradient(
135deg,
#c1121f,
#e63946,
#ff6b6b
);

color:white;
text-align:center;

padding:20px 14px;

font-size:13px;

line-height:1.7;

}

/* DESKTOP */

@media(min-width:768px){

.logo{
width:155px;
}

.school-name{
font-size:36px;
}

.card{
padding:45px;
}

}

</style>
</head>

<body>

<header>

<img src="burapa-logo.png" class="logo">

<div class="system-name">
ระบบบริหารจัดการสถิตินักเรียน
</div>

<div class="school-name">
โรงเรียนเทศบาลบูรพาอุบล
</div>

<div class="term" id="termDisplay"></div>

<div class="status">
🟢 ระบบพร้อมใช้งาน
</div>

</header>

<div class="main">

<div class="card">

<h2>เริ่มต้นใช้งานระบบ</h2>

<button class="btn btn-teacher"
onclick="location.href='teacher-dashboard.html'">

👩‍🏫 สำหรับคุณครูประจำชั้น

</button>

<button class="btn btn-admin"
onclick="location.href='admin-login.html'">

👨‍💼 สำหรับผู้บริหาร / ผู้ดูแลระบบ

</button>

<button class="btn btn-manual"
onclick="openManual()">

📖 คู่มือการใช้งานระบบ

</button>

</div>

</div>

<footer>

ระบบบริหารจัดการสถิตินักเรียน (BURAPA.STU)

<br>

ภาคเรียนที่ <span id="termFooter"></span>

<br>

โรงเรียนเทศบาลบูรพาอุบล

<br>

สำนักการศึกษา  
เทศบาลนครอุบลราชธานี

</footer>

<script>

function loadTerm(){

let term = localStorage.getItem("term")
let year = localStorage.getItem("year")

if(!term){
term="2"
year="2568"
}

document.getElementById("termDisplay").innerHTML=
"ภาคเรียนที่ "+term+" ปีการศึกษา "+year

document.getElementById("termFooter").innerHTML=
term+"/"+year

}

function openManual(){

window.open(
"รอใส่ลิ้งคู่มือ",
"_blank"
)

}

loadTerm()

</script>

</body>
</html>
