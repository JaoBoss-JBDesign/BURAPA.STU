<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BURAPA STUDENT SYSTEM</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Prompt',sans-serif;
}

body{
min-height:100vh;
background:#f4f6fb;
display:flex;
flex-direction:column;
}

/* HEADER */

header{

background:linear-gradient(
135deg,
#d62828,
#e63946
);

color:white;
text-align:center;

padding:22px 16px 18px;

}

/* LOGO */

.logo{
width:120px;
margin-bottom:6px;
}

/* TEXT */

.system-name{
font-size:14px;
opacity:.95;
}

.school-name{

font-size:26px;
font-weight:700;

margin-top:4px;

text-shadow:0 2px 4px rgba(0,0,0,.25);

}

.term{
font-size:13px;
margin-top:6px;
opacity:.95;
}

/* MAIN */

.main{

flex:1;

display:flex;

align-items:center;

justify-content:center;

padding:26px 16px;

}

/* CARD */

.card{

width:100%;
max-width:520px;

background:white;

border-radius:18px;

padding:34px 26px;

box-shadow:0 14px 35px rgba(0,0,0,.08);

text-align:center;

}

.card h2{

font-size:20px;

margin-bottom:20px;

color:#333;

}

/* BUTTON */

.btn{

display:block;

width:100%;

padding:18px;

margin-top:14px;

border:none;

border-radius:14px;

font-size:16px;

font-weight:500;

cursor:pointer;

transition:.2s;

}

/* teacher */

.btn-teacher{

background:linear-gradient(
135deg,
#e63946,
#ff6b6b
);

color:white;

}

/* admin */

.btn-admin{

background:linear-gradient(
135deg,
#f4c430,
#ffd166
);

color:#333;

}

/* manual */

.btn-manual{

background:#eef1f6;
border:1px solid #dfe3ea;
color:#333;

}

.btn:hover{

transform:translateY(-3px);

box-shadow:0 8px 20px rgba(0,0,0,.12);

}

/* FOOTER */

footer{

background:linear-gradient(
135deg,
#d62828,
#e63946
);

color:white;

text-align:center;

padding:18px 14px;

font-size:13px;

line-height:1.7;

}

/* DESKTOP */

@media(min-width:768px){

.logo{
width:140px;
}

.school-name{
font-size:30px;
}

.card{
padding:40px;
}

}

</style>
</head>

<body>

<header>

<img src="burapa-logo.png" class="logo">

<div class="system-name">
ระบบบริหารจัดการสถิตินักเรียน
</div>

<div class="school-name">
โรงเรียนเทศบาลบูรพาอุบล
</div>

<div class="term" id="termDisplay"></div>

</header>

<div class="main">

<div class="card">

<h2>เลือกการเข้าใช้งานระบบ</h2>

<button class="btn btn-teacher"
onclick="location.href='teacher-dashboard.html'">

👩‍🏫 สำหรับคุณครูประจำชั้น

</button>

<button class="btn btn-admin"
onclick="location.href='admin-login.html'">

👨‍💼 สำหรับผู้บริหาร / ผู้ดูแลระบบ

</button>

<button class="btn btn-manual"
onclick="openManual()">

📖 คู่มือการใช้งานระบบ

</button>

</div>

</div>

<footer>

ระบบบริหารจัดการสถิตินักเรียน (BURAPA.STU)

<br>

ภาคเรียนที่ <span id="termFooter"></span>

<br>

โรงเรียนเทศบาลบูรพาอุบล

<br>

สำนักการศึกษา  
เทศบาลนครอุบลราชธานี

</footer>

<script>

function loadTerm(){

let term = localStorage.getItem("term")
let year = localStorage.getItem("year")

if(!term){
term="2"
year="2568"
}

document.getElementById("termDisplay").innerHTML=
"ภาคเรียนที่ "+term+" ปีการศึกษา "+year

document.getElementById("termFooter").innerHTML=
term+"/"+year

}

function openManual(){

window.open(
"รอใส่ลิ้งคู่มือ",
"_blank"
)

}

loadTerm()

</script>

</body>
</html>
