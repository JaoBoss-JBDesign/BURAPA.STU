<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BURAPA.STU SYSTEM</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:'Prompt',sans-serif;

background:linear-gradient(
135deg,
#ffd6e7,
#ffeaa7
);

min-height:100vh;

display:flex;
flex-direction:column;
}

header{
text-align:center;
padding:50px 20px 30px;
}

.logo{
width:110px;
margin-bottom:15px;
}

.system-name{
font-size:18px;
color:#555;
}

.school-name{
font-size:32px;
font-weight:600;
color:#333;
margin-top:5px;
}

.term{
margin-top:8px;
font-size:14px;
color:#777;
}

.main{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

.card{

background:white;

padding:40px;

border-radius:20px;

box-shadow:0 10px 30px rgba(0,0,0,0.1);

text-align:center;

width:340px;

}

.card h2{
margin-top:0;
color:#444;
}

.btn{

display:block;
width:100%;
padding:14px;
margin-top:15px;

border:none;
border-radius:10px;

font-size:15px;
font-weight:500;

cursor:pointer;

transition:0.25s;

}

.btn-teacher{
background:#ff6b81;
color:white;
}

.btn-admin{
background:#ffd93d;
color:#333;
}

.btn:hover{
transform:translateY(-3px);
box-shadow:0 6px 15px rgba(0,0,0,0.15);
}

footer{

text-align:center;

padding:18px;

font-size:13px;

color:#555;

}

</style>

</head>

<body>

<header>

<img src="burapa-logo.png" class="logo">

<div class="system-name">
ระบบบริหารจัดการสถิตินักเรียน
</div>
  
<div class="school-name">
โรงเรียนเทศบาลบูรพาอุบล
</div>

<div class="term" id="termDisplay"></div>

</header>


<div class="main">

<div class="card">

<h2>เริ่มต้นใช้งานระบบ</h2>

<button class="btn btn-teacher"
onclick="location.href='teacher-dashboard.html'">
👩‍🏫 สำหรับคุณครูประจำชั้น
</button>

<button class="btn btn-admin"
onclick="location.href='admin-login.html'">
👨‍💼 สำหรับผู้บริหารและผู้ดูแลระบบ
</button>

</div>

</div>

<footer>

ระบบบริหารจัดการสถิตินักเรียน  
ภาคเรียนที่ <span id="termFooter"></span>  

<br>

โรงเรียนเทศบาลบูรพาอุบล  

<br>

สำนักการศึกษา เทศบาลนครอุบลราชธานี

</footer>


<script>

function loadTerm(){

let term = localStorage.getItem("term")
let year = localStorage.getItem("year")

if(!term){
term="2"
year="2568"
}

document.getElementById("termDisplay").innerHTML=
"ภาคเรียนที่ "+term+" ปีการศึกษา "+year

document.getElementById("termFooter").innerHTML=
term+"/"+year

}

loadTerm()

</script>

</body>
</html>
