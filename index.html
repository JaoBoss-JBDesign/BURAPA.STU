<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BURAPA STUDENT SYSTEM</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Prompt',sans-serif;
}

/* BODY */

body{
min-height:100vh;
background:linear-gradient(180deg,#f6f7fb,#eef1f8);
display:flex;
flex-direction:column;
position:relative;
}

/* PARTICLES */

.particle{
position:absolute;
width:7px;
height:7px;
background:#ffb3b3;
border-radius:50%;
opacity:.4;
animation:fall linear infinite;
}

@keyframes fall{
from{
transform:translateY(-10vh);
opacity:.6;
}
to{
transform:translateY(110vh);
opacity:0;
}
}

/* BACKGROUND */

body::before{
content:"";
position:absolute;
top:-200px;
right:-200px;
width:450px;
height:450px;
background:radial-gradient(circle,#ffb3b3,transparent);
opacity:.35;
z-index:-1;
}

body::after{
content:"";
position:absolute;
bottom:-200px;
left:-200px;
width:450px;
height:450px;
background:radial-gradient(circle,#ffd6d6,transparent);
opacity:.35;
z-index:-1;
}

/* LOADING */

#loading{
position:fixed;
inset:0;
background:white;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:999;
transition:.5s;
}

.loader{
width:45px;
height:45px;
border:4px solid #eee;
border-top:4px solid #e63946;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg)}
}

/* HEADER */

header{

background:linear-gradient(
135deg,
#c1121f,
#e63946,
#ff6b6b
);

background-size:200% 200%;
animation:gradientMove 6s ease infinite;

color:white;
text-align:center;

padding:calc(14px + env(safe-area-inset-top)) 12px 14px;

}

@keyframes gradientMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* LOGO */

.logo{
width:clamp(90px,14vw,120px);
margin-bottom:4px;
filter:drop-shadow(0 5px 10px rgba(0,0,0,.25));
transition:.5s;
}

.logo:hover{
transform:rotate(8deg) scale(1.05);
}

/* TEXT */

.system-name{
font-size:13px;
opacity:.95;
}

.school-name{
font-size:clamp(18px,3.5vw,28px);
font-weight:700;
margin-top:3px;
white-space:nowrap;
text-shadow:0 3px 8px rgba(0,0,0,.25);
}

.term{
font-size:12px;
margin-top:4px;
opacity:.95;
}

.time{
font-size:12px;
margin-top:2px;
opacity:.9;
}

/* MAIN */

.main{
flex:1;
display:flex;
align-items:center;
justify-content:center;
padding:12px 16px;
}

/* CARD */

.card{

width:100%;
max-width:500px;

background:rgba(255,255,255,.85);
backdrop-filter:blur(12px);

border-radius:20px;

padding:26px 22px;

box-shadow:
0 20px 50px rgba(0,0,0,.08),
0 5px 15px rgba(0,0,0,.05);

text-align:center;

border-top:5px solid #e63946;

animation:fadeIn .5s ease;

}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

.card h2{
font-size:19px;
margin-bottom:18px;
color:#333;
}

/* BUTTON */

.btn{

display:flex;
align-items:center;
justify-content:center;
gap:10px;

width:100%;
padding:15px;

margin-top:11px;

border:none;
border-radius:12px;

font-size:15px;
font-weight:500;

cursor:pointer;

position:relative;
overflow:hidden;

transition:.25s;

}

.btn i{
font-size:18px;
}

/* LIGHT SWEEP */

.btn::after{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,.4),transparent);
transition:.5s;
}

.btn:hover::after{
left:100%;
}

.btn:hover{
transform:translateY(-3px);
box-shadow:0 0 15px rgba(255,100,100,.5);
}

.btn:active{
transform:scale(.96);
}

/* BUTTON COLORS */

.btn-teacher{
background:linear-gradient(135deg,#d62828,#ff6b6b);
color:white;
}

.btn-admin{
background:linear-gradient(135deg,#f4c430,#ffd166);
color:#333;
}

.btn-manual{
background:#eef1f6;
border:1px solid #dde2ea;
color:#333;
}

/* FOOTER */

footer{

background:linear-gradient(
135deg,
#c1121f,
#e63946,
#ff6b6b
);

color:white;
text-align:center;

padding:12px 10px;

font-size:12px;

line-height:1.6;

}

</style>
</head>

<body>

<div id="loading">
<div class="loader"></div>
<div style="margin-top:12px;font-size:14px;color:#555">
กำลังโหลดระบบ...
</div>
</div>

<header>

<img src="burapa-logo.png" class="logo">

<div class="system-name">
ระบบบริหารจัดการสถิตินักเรียน
</div>

<div class="school-name">
โรงเรียนเทศบาลบูรพาอุบล
</div>

<div class="term" id="termDisplay"></div>
<div class="time" id="clock"></div>

</header>

<div class="main">

<div class="card">

<h2>เริ่มต้นใช้งานระบบ</h2>

<button class="btn btn-teacher"
onclick="location.href='teacher-dashboard.html'">
<i class="bi bi-person-workspace"></i>
สำหรับคุณครูประจำชั้น
</button>

<button class="btn btn-admin"
onclick="location.href='admin-login.html'">
<i class="bi bi-person-gear"></i>
สำหรับผู้บริหาร / ผู้ดูแลระบบ
</button>

<button class="btn btn-manual"
onclick="openManual()">
<i class="bi bi-book"></i>
คู่มือการใช้งานระบบ
</button>

</div>

</div>

<footer>

ระบบบริหารจัดการสถิตินักเรียน (BURAPA.STU)

<br>

ภาคเรียนที่ <span id="termFooter"></span>

<br>

โรงเรียนเทศบาลบูรพาอุบล

<br>

สำนักการศึกษา  
เทศบาลนครอุบลราชธานี

</footer>

<script>

function loadTerm(){

let term=localStorage.getItem("term")
let year=localStorage.getItem("year")

if(!term){
term="2"
year="2568"
}

document.getElementById("termDisplay").innerHTML=
"ภาคเรียนที่ "+term+" ปีการศึกษา "+year

document.getElementById("termFooter").innerHTML=
term+"/"+year

}

loadTerm()

/* CLOCK THAI FORMAT */

function updateClock(){

let now=new Date()

let days=["วันอาทิตย์","วันจันทร์","วันอังคาร","วันพุธ","วันพฤหัสบดี","วันศุกร์","วันเสาร์"]
let months=["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"]

let day=days[now.getDay()]
let date=now.getDate()
let month=months[now.getMonth()]
let year=now.getFullYear()+543

let h=String(now.getHours()).padStart(2,"0")
let m=String(now.getMinutes()).padStart(2,"0")

document.getElementById("clock").innerHTML=
day+"ที่ "+date+" "+month+" พ.ศ."+year+" เวลา "+h+"."+m+" น."

}

setInterval(updateClock,1000)
updateClock()

/* LOADING */

window.onload=function(){

setTimeout(function(){

document.getElementById("loading").style.opacity="0"

setTimeout(function(){
document.getElementById("loading").style.display="none"
},400)

},500)

}

/* PARTICLES */

for(let i=0;i<18;i++){

let p=document.createElement("div")

p.className="particle"

p.style.left=Math.random()*100+"%"
p.style.animationDuration=(6+Math.random()*10)+"s"
p.style.opacity=Math.random()

document.body.appendChild(p)

}

</script>

</body>
</html>
