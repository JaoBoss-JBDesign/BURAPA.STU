<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BURAPA STUDENT SYSTEM</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Prompt',sans-serif;
}

body{

min-height:100vh;

background:linear-gradient(
135deg,
#ffd6e7,
#fff0b3
);

display:flex;
flex-direction:column;
position:relative;
overflow-x:hidden;

}

.bg-shape1{
position:absolute;
width:300px;
height:300px;
background:#ff9ec4;
border-radius:50%;
top:-100px;
left:-80px;
opacity:0.25;
filter:blur(60px);
}

.bg-shape2{
position:absolute;
width:350px;
height:350px;
background:#ffe066;
border-radius:50%;
bottom:-120px;
right:-100px;
opacity:0.25;
filter:blur(70px);
}

header{

text-align:center;

padding:40px 20px;

background:rgba(255,255,255,0.85);

backdrop-filter:blur(10px);

box-shadow:0 5px 25px rgba(0,0,0,0.08);

position:relative;
z-index:2;

}

.logo{

width:110px;
margin-bottom:10px;
animation:float 4s ease-in-out infinite;

}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-6px)}
100%{transform:translateY(0)}
}

.system-name{

font-size:18px;
color:#666;

}

.school-name{

font-size:34px;
font-weight:600;

color:#333;

margin-top:5px;

}

.term{

margin-top:8px;
font-size:14px;
color:#888;

}

.main{

flex:1;

display:flex;

justify-content:center;

align-items:center;

padding:40px;

position:relative;
z-index:2;

}

.card{

background:rgba(255,255,255,0.75);

backdrop-filter:blur(12px);

padding:50px;

border-radius:28px;

width:400px;

text-align:center;

box-shadow:0 25px 50px rgba(0,0,0,0.15);

}

.card h2{

margin-bottom:30px;

color:#444;

font-weight:500;

}

.btn{

display:block;

width:100%;

padding:20px;

margin-top:20px;

border:none;

border-radius:16px;

font-size:17px;

font-weight:500;

cursor:pointer;

transition:0.25s;

}

.btn-teacher{

background:linear-gradient(
135deg,
#ff6b81,
#ff8fa3
);

color:white;

}

.btn-admin{

background:linear-gradient(
135deg,
#ffd93d,
#ffe066
);

color:#333;

}

.btn:hover{

transform:translateY(-5px) scale(1.02);

box-shadow:0 10px 25px rgba(0,0,0,0.18);

}

footer{

background:linear-gradient(
135deg,
#ff6b81,
#ff8fa3
);

color:white;

text-align:center;

padding:30px;

font-size:14px;

}

.footer-small{

font-size:13px;

opacity:0.9;

margin-top:6px;

}

</style>

</head>

<body>

<div class="bg-shape1"></div>
<div class="bg-shape2"></div>

<header>

<img src="burapa-logo.png" class="logo">

<div class="system-name">
ระบบบริหารจัดการสถิตินักเรียน
</div>

<div class="school-name">
โรงเรียนเทศบาลบูรพาอุบล
</div>

<div class="term" id="termDisplay"></div>

</header>


<div class="main">

<div class="card">

<h2>เริ่มต้นใช้งานระบบ</h2>

<button class="btn btn-teacher"
onclick="location.href='teacher-dashboard.html'">

👩‍🏫 สำหรับคุณครูประจำชั้น

</button>

<button class="btn btn-admin"
onclick="location.href='admin-login.html'">

👨‍💼 สำหรับผู้บริหารและผู้ดูแลระบบ

</button>

</div>

</div>


<footer>

ระบบบริหารจัดการสถิตินักเรียน (BURAPA.STU)  
ภาคเรียนที่ <span id="termFooter"></span>

<div class="footer-small">

โรงเรียนเทศบาลบูรพาอุบล  
สำนักการศึกษา เทศบาลนครอุบลราชธานี

</div>

</footer>


<script>

function loadTerm(){

let term = localStorage.getItem("term")
let year = localStorage.getItem("year")

if(!term){
term="2"
year="2568"
}

document.getElementById("termDisplay").innerHTML=
"ภาคเรียนที่ "+term+" ปีการศึกษา "+year

document.getElementById("termFooter").innerHTML=
term+"/"+year

}

loadTerm()

</script>

</body>
</html>
