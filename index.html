<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BURAPA STUDENT SYSTEM</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Prompt',sans-serif;
}

body{
min-height:100vh;
background:#f8f9fc;
display:flex;
flex-direction:column;
}

header{
background:linear-gradient(
135deg,
#d62828,
#e63946,
#ff6b6b
);
color:white;
text-align:center;
padding:20px 16px 16px;
}

.logo{
width:120px;
margin-bottom:6px;
}

.system-name{
font-size:14px;
opacity:.95;
}

.school-name{
font-size:28px;
font-weight:700;
margin-top:4px;
text-shadow:0 3px 8px rgba(0,0,0,.25);
}

.term{
font-size:13px;
margin-top:6px;
opacity:.95;
}

.main{
flex:1;
display:flex;
align-items:center;
justify-content:center;
padding:26px 16px;
}

.card{
width:100%;
max-width:520px;
background:white;
border-radius:20px;
padding:36px 28px;
box-shadow:0 18px 45px rgba(0,0,0,.08);
text-align:center;
}

.card h2{
font-size:20px;
margin-bottom:22px;
color:#333;
}

.btn{
display:block;
width:100%;
padding:18px;
margin-top:14px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:500;
cursor:pointer;
transition:.25s;
}

.btn-teacher{
background:linear-gradient(
135deg,
#d62828,
#ff6b6b
);
color:white;
}

.btn-admin{
background:linear-gradient(135deg,#f4c430,#ffd166);
color:#333;
}

.btn-manual{
background:#eef1f6;
border:1px solid #dfe3ea;
color:#333;
}

.btn:hover{
transform:translateY(-4px);
box-shadow:0 10px 25px rgba(0,0,0,.15);
}

footer{
background:linear-gradient(135deg,#d62828,#e63946,#ff6b6b);
color:white;
text-align:center;
padding:18px 14px;
font-size:13px;
line-height:1.7;
}

@media(min-width:768px){
.logo{width:140px;
}

.school-name{
  font-size:32px;
}

  .card{
padding:42px;
}

}

</style>
</head>

<body>
<header>
<img src="burapa-logo.png" class="logo">

<div class="system-name">
ระบบบริหารจัดการสถิตินักเรียน
</div>

<div class="school-name">
โรงเรียนเทศบาลบูรพาอุบล
</div>

<div class="term" id="termDisplay"></div>
</header>

<div class="main">

<div class="card">

<h2>เลือกการเข้าใช้งานระบบ</h2>

<button class="btn btn-teacher"
onclick="location.href='teacher-dashboard.html'">

👩‍🏫 สำหรับคุณครูประจำชั้น

</button>

<button class="btn btn-admin"
onclick="location.href='admin-login.html'">

👨‍💼 สำหรับผู้บริหาร / ผู้ดูแลระบบ

</button>

<button class="btn btn-manual"
onclick="openManual()">

📖 คู่มือการใช้งานระบบ

</button>
</div>
</div>

<footer>

ระบบบริหารจัดการสถิตินักเรียน (BURAPA.STU)

<br>

ภาคเรียนที่ <span id="termFooter"></span>

<br>

โรงเรียนเทศบาลบูรพาอุบล

<br>

สำนักการศึกษา  
เทศบาลนครอุบลราชธานี

</footer>

<script>

function loadTerm(){

let term = localStorage.getItem("term")
let year = localStorage.getItem("year")

if(!term){
term="2"
year="2568"
}

document.getElementById("termDisplay").innerHTML=
"ภาคเรียนที่ "+term+" ปีการศึกษา "+year

document.getElementById("termFooter").innerHTML=
term+"/"+year

}

function openManual(){

window.open(
"รอใส่ลิ้งคู่มือ",
"_blank"
)

}

loadTerm()

</script>

</body>
</html>
