<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BURAPA STUDENT SYSTEM</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Prompt',sans-serif;
}

body{
min-height:100vh;
background:#f4f6fb;
display:flex;
flex-direction:column;
position:relative;
overflow-x:hidden;
}

body::before{
content:"";
position:absolute;
top:-120px;
left:-120px;
width:300px;
height:300px;
background:#ffd2d6;
border-radius:50%;
filter:blur(120px);
opacity:.6;
}

body::after{
content:"";
position:absolute;
bottom:-120px;
right:-120px;
width:320px;
height:320px;
background:#ffe7a3;
border-radius:50%;
filter:blur(130px);
opacity:.6;
}

header{
background:linear-gradient(135deg,#c1121f,#e63946);
color:white;
text-align:center;
padding:34px 18px 30px;
box-shadow:0 6px 18px rgba(0,0,0,.12);
position:relative;
z-index:2;
}

.logo{
width:120px;
margin-bottom:10px;
filter:drop-shadow(0 4px 6px rgba(0,0,0,.3));
}

.system-name{
font-size:14px;
opacity:.95;
}

.school-name{
font-size:24px;
font-weight:600;
margin-top:4px;
}

.term{
font-size:13px;
margin-top:6px;
opacity:.9;
}

.main{
flex:1;
padding:22px;
display:flex;
align-items:center;
justify-content:center;
position:relative;
z-index:2;
}

.card{
background:white;
width:100%;
max-width:420px;
padding:28px;
border-radius:18px;
box-shadow:0 10px 28px rgba(0,0,0,.08);
text-align:center;
}

.card h2{
font-size:18px;
margin-bottom:18px;
color:#333;
}

.btn{
display:block;
width:100%;
padding:16px;
margin-top:12px;
border:none;
border-radius:14px;
font-size:15px;
font-weight:500;
cursor:pointer;
transition:.2s;
}

.btn-teacher{
background:linear-gradient(135deg,#e63946,#ff6b6b);
color:white;
}

.btn-admin{
background:linear-gradient(135deg,#f6c945,#ffd95c);
color:#333;
}

.btn-manual{
background:#eef1f7;
color:#333;
border:1px solid #d8dde6;
}

.btn:hover{
transform:translateY(-3px);
box-shadow:0 6px 14px rgba(0,0,0,.12);
}

footer{
background:linear-gradient(135deg,#c1121f,#e63946);
color:white;
text-align:center;
padding:22px 16px;
font-size:13px;
line-height:1.7;
margin-top:auto;
}

@media(min-width:768px){
.logo{
width:140px;
}

.school-name{
font-size:28px;
}

.card{
padding:34px;
}

}
</style>
</head>

<body>
<header>
<img src="burapa-logo.png" class="logo">
<div class="system-name">
ระบบบริหารจัดการสถิตินักเรียน
</div>

<div class="school-name">
โรงเรียนเทศบาลบูรพาอุบล
</div>

<div class="term" id="termDisplay"></div>

</header>

<div class="main">

<div class="card">
<h2>เลือกการเข้าใช้งาน</h2>
<button class="btn btn-teacher"
onclick="location.href='teacher-dashboard.html'">

👩‍🏫 สำหรับคุณครูประจำชั้น

</button>

<button class="btn btn-admin"
onclick="location.href='admin-login.html'">

👨‍💼 สำหรับผู้บริหาร / ผู้ดูแลระบบ

</button>

<button class="btn btn-manual"
onclick="openManual()">

📖 คู่มือการใช้งานระบบ

</button>

</div>

</div>
  
<footer>

ระบบบริหารจัดการสถิตินักเรียน (BURAPA.STU)

<br>

ภาคเรียนที่ <span id="termFooter"></span>

<br>

โรงเรียนเทศบาลบูรพาอุบล

<br>

สำนักการศึกษา  
เทศบาลนครอุบลราชธานี

</footer>
  
<script>

function loadTerm(){

let term = localStorage.getItem("term")
let year = localStorage.getItem("year")

if(!term){
term="2"
year="2568"
}

document.getElementById("termDisplay").innerHTML=
"ภาคเรียนที่ "+term+" ปีการศึกษา "+year

document.getElementById("termFooter").innerHTML=
term+"/"+year

}

function openManual(){

window.open(
"รอใส่ลิ้งคู่มือ",
"_blank"
)

}

loadTerm()

</script>

</body>
</html>
