<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BURAPA STUDENT SYSTEM</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>
*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Prompt',sans-serif;
}

html,body{
max-width:100%;
overflow-x:hidden;
}

body{

min-height:100vh;
min-height:100svh;
min-height:100dvh;

display:flex;
flex-direction:column;

background:
linear-gradient(180deg,#f6f7fb,#eef1f8),
radial-gradient(circle at 20% 20%, rgba(214,40,40,.06), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(214,40,40,.05), transparent 40%);

position:relative;
overflow-x:hidden;

}

body::before{
content:"";
position:fixed;
top:-200px;
right:-200px;
width:420px;
height:420px;
background:radial-gradient(circle,#ffb3b3,transparent);
opacity:.35;
z-index:-1;
}

body::after{
content:"";
position:fixed;
bottom:-200px;
left:-200px;
width:420px;
height:420px;
background:radial-gradient(circle,#ffd6d6,transparent);
opacity:.35;
z-index:-1;
}

.particle{
position:fixed;
top:-10px;
width:6px;
height:6px;
background:#ff9a9a;
border-radius:50%;
opacity:.35;
pointer-events:none;

animation:fall linear infinite;
}

@keyframes fall{

0%{
transform:translateY(-20px);
}

100%{
transform:translateY(110vh);
}

}

#loading{
position:fixed;
inset:0;
background:white;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:999;
}

.loader{
width:45px;
height:45px;
border:4px solid #eee;
border-top:4px solid #e63946;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg)}
}

header{

background:linear-gradient(135deg,#c1121f,#e63946,#ff6b6b);
background-size:200% 200%;

animation:gradientMove 6s ease infinite;

color:white;
text-align:center;

padding:14px 10px;

flex-shrink:0;

border-bottom:1px solid rgba(255,255,255,.25);
box-shadow:0 8px 20px rgba(0,0,0,.08);
}

@keyframes gradientMove{

0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}

}

.logo{

width:clamp(80px,12vw,110px);
margin-bottom:4px;

animation:float 4s ease-in-out infinite;

filter:drop-shadow(0 6px 10px rgba(0,0,0,.25));

}

.logo:hover{
transform:rotate(6deg) scale(1.05);
transition:.4s;
}

@keyframes float{

0%{transform:translateY(0)}
50%{transform:translateY(-6px)}
100%{transform:translateY(0)}

}

.system-name{
font-size:13px;
opacity:.95;
}

.school-name{

font-size:clamp(18px,3.2vw,26px);
font-weight:700;

white-space:nowrap;

text-shadow:0 3px 8px rgba(0,0,0,.25);

}

.term{
font-size:12px;
margin-top:4px;
}

.time{
font-size:12px;
margin-top:2px;
}

main{

flex:1;

display:flex;
align-items:center;
justify-content:center;

padding:16px;

}

.card{

width:100%;
max-width:480px;

background:rgba(255,255,255,.85);
backdrop-filter:blur(12px);

border-radius:20px;

padding:28px 24px;

box-shadow:0 25px 60px rgba(0,0,0,.12);
0 8px 25px rgba(214,40,40,.08);
  
border-top:5px solid #e63946;

text-align:center;

animation:cardEnter .6s ease;

}

@keyframes cardEnter{

from{
opacity:0;
transform:translateY(20px) scale(.96);
}

to{
opacity:1;
transform:translateY(0) scale(1);
}

}

.card h2{
font-size:18px;
margin-bottom:16px;
}

.btn{

display:flex;
align-items:center;
justify-content:center;

gap:10px;

width:100%;

padding:14px;

margin-top:10px;

border:none;
border-radius:12px;

font-size:15px;
font-weight:500;

cursor:pointer;

position:relative;
overflow:hidden;

transition:.25s;

}

.btn i{
font-size:18px;
}

.btn::after{

content:"";

position:absolute;

top:0;
left:-100%;

width:100%;
height:100%;

background:linear-gradient(120deg,transparent,rgba(255,255,255,.4),transparent);

transition:.6s;

}

.btn:hover::after{
left:100%;
}

.btn:hover{

transform:translateY(-3px);

box-shadow:0 0 18px rgba(255,100,100,.45);

}

.btn:active{
transform:scale(.96);
}

.btn-teacher{
background:linear-gradient(135deg,#d62828,#ff6b6b);
color:white;
}

.btn-admin{
background:linear-gradient(135deg,#ffd166,#ffe29a);
color:#333;
}

.btn-manual{
background:#eef1f6;
border:1px solid #dde2ea;
}

footer{
background:#e63946;
color:white;
text-align:center;
font-size:11px;
padding:6px 10px;
flex-shrink:0;
line-height:1.5;
opacity:.85;
}
</style>
</head>

<body>

<div id="loading">

<div class="loader"></div>

<div style="margin-top:12px;font-size:14px;color:#555">
กำลังเริ่มระบบ โปรดรอสักครู่...
</div>

</div>

<header>

<img src="burapa-logo.png" class="logo">

<div class="system-name">
ระบบบริหารจัดการสถิตินักเรียน
</div>

<div class="school-name">
โรงเรียนเทศบาลบูรพาอุบล
</div>
  
<div class="term" id="termDisplay"></div>
<div class="time" id="clock"></div>

</header>

<main>

<div class="card">

<h2>เริ่มต้นใช้งานระบบ</h2>
<div style="font-size:12px;color:#666;margin-bottom:12px">
เลือกเมนูเพื่อเข้าสู่ระบบการจัดการสถิตินักเรียน
</div>

<button class="btn btn-teacher"
onclick="location.href='teacher-dashboard.html'">

<i class="bi bi-person-workspace"></i>
สำหรับคุณครูประจำชั้น

</button>

<button class="btn btn-admin"
onclick="location.href='admin-login.html'">

<i class="bi bi-person-gear"></i>
สำหรับผู้บริหาร / ผู้ดูแลระบบ

</button>

<button class="btn btn-manual">

<i class="bi bi-book"></i>
คู่มือการใช้งานระบบ

</button>

</div>

</main>

<footer>

ระบบบริหารจัดการสถิตินักเรียน (BURAPA.STU)

<br>

ภาคเรียนที่ <span id="termFooter"></span>

<br>

โรงเรียนเทศบาลบูรพาอุบล

<br>

สำนักการศึกษา เทศบาลนครอุบลราชธานี

</footer>

<script>

function loadTerm(){

let term=localStorage.getItem("term")
let year=localStorage.getItem("year")

if(!term){
term="2"
year="2568"
}

document.getElementById("termDisplay").innerHTML=
"ภาคเรียนที่ "+term+" ปีการศึกษา "+year

document.getElementById("termFooter").innerHTML=
term+"/"+year

}

loadTerm()

function updateClock(){

let now=new Date()

let days=["วันอาทิตย์","วันจันทร์","วันอังคาร","วันพุธ","วันพฤหัสบดี","วันศุกร์","วันเสาร์"]
let months=["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"]

let day=days[now.getDay()]
let date=now.getDate()
let month=months[now.getMonth()]
let year=now.getFullYear()+543

let h=String(now.getHours()).padStart(2,"0")
let m=String(now.getMinutes()).padStart(2,"0")
let s=String(now.getSeconds()).padStart(2,"0")

document.getElementById("clock").innerHTML=
day+"ที่ "+date+" "+month+" พ.ศ."+year+" เวลา "+h+":"+m+":"+s+" น."

}

setInterval(updateClock,1000)
updateClock()

window.onload=function(){

setTimeout(()=>{

document.getElementById("loading").style.display="none"

},600)

}

for(let i=0;i<20;i++){

let p=document.createElement("div")

p.className="particle"

p.style.left=Math.random()*100+"%"
p.style.animationDuration=(8+Math.random()*8)+"s"
p.style.opacity=Math.random()

document.body.appendChild(p)

}

</script>

</body>
</html>
