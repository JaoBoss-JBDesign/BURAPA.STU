<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>รายงานสถิตินักเรียน</title>

<style>
body{
  font-family:'TH Sarabun New','Prompt',sans-serif;
  margin:0;
  background:#f3f4f6;
}

/* 📄 A4 */
.report{
  width:210mm;
  min-height:297mm;
  margin:auto;
  padding:15mm;
  background:white;
}

/* header */
.header{
  text-align:center;
  margin-bottom:10px;
}

.header h2{
  margin:0;
  font-size:20px;
}

.header p{
  margin:4px 0;
  font-size:16px;
}

/* table */
table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}

th, td{
  border:1px solid #000;
  padding:5px;
  text-align:center;
}

th{
  background:#e5e7eb;
  font-weight:600;
}

/* group row */
.group{
  background:#f1f5f9;
  font-weight:bold;
  text-align:left;
  padding-left:8px;
}

/* total row */
.total{
  background:#fde68a;
  font-weight:bold;
}

/* summary */
.summary{
  margin-top:12px;
  font-size:14px;
  line-height:1.6;
}

/* footer */
.footer{
  margin-top:40px;
  display:grid;
  grid-template-columns: repeat(2,1fr);
  gap:40px;
  text-align:center;
}

/* print */
@media print{
  button{display:none;}
  @page{ size:A4; margin:10mm; }
}
</style>
</head>

<body>

<div class="report" id="report">

<div class="header">
<h2>รายงานสถิตินักเรียนประจำวัน</h2>
<p id="dateText"></p>
</div>

<table>
<thead>
<tr>
<th>ชั้น</th>
<th>ทั้งหมด</th>
<th>มาเรียน</th>
<th>ป่วย</th>
<th>ลา</th>
<th>ขาด</th>
</tr>
</thead>

<tbody id="dataBody"></tbody>
</table>

<div class="summary" id="summary"></div>

<div class="footer">
<div>ลงชื่อ....................................ครูเวร</div>
<div>ลงชื่อ............................ฝ่ายบริหาร</div>
<div>ลงชื่อ............................รองผอ.</div>
<div>ลงชื่อ.............................ผอ.</div>
</div>

</div>

<div style="text-align:center;margin:20px;">
<button onclick="exportPDF()">ดาวน์โหลด PDF</button>
<button onclick="window.print()">พิมพ์</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
const API="https://script.google.com/macros/s/AKfycbzwmS_Aip0yJ-vQgQhGZ7c58MkeHHMH2zpy5lC_3SLLDDAaPMD-wrUdGkp5QXLhgomp9g/exec"

const date = new URLSearchParams(location.search).get("date")

document.getElementById("dateText").innerText =
new Date(date).toLocaleDateString('th-TH',{dateStyle:'full'})

async function loadReport(){

const res = await fetch(API+"?mode=report&date="+date)
const data = await res.json()

let html=""
let totalAll=0, totalPresent=0

data.forEach(r=>{

let total = Number(r.total)||0
let present = Number(r.present)||0

totalAll+=total
totalPresent+=present

html+=`
<tr>
<td>${r.room}</td>
<td>${total}</td>
<td>${present}</td>
<td>${r.sick || ""}</td>
<td>${r.leave || ""}</td>
<td>${r.absent || ""}</td>
</tr>
`
})

html+=`
<tr class="total">
<td>รวมทั้งหมด</td>
<td>${totalAll}</td>
<td>${totalPresent}</td>
<td></td><td></td><td></td>
</tr>
`

document.getElementById("dataBody").innerHTML=html

let percent = totalAll ? ((totalPresent/totalAll)*100).toFixed(2):0

document.getElementById("summary").innerHTML=
`นักเรียนทั้งหมด ${totalAll} คน<br>
มาเรียน ${totalPresent} คน<br>
คิดเป็น ${percent}%`

}

loadReport()

function exportPDF(){
html2pdf().set({
margin:0,
filename:'report-'+date+'.pdf',
html2canvas:{scale:2},
jsPDF:{unit:'mm',format:'a4'}
})
.from(document.getElementById("report"))
.save()
}
</script>

</body>
</html>
