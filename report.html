<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>รายงานสถิตินักเรียน</title>

<style>
body{
  font-family:'Prompt',sans-serif;
  background:#f9fafb;
  margin:0;
  padding:0;
}

/* 🔥 container สำคัญมาก แก้ปัญหา PDF ลอย */
.report{
  width:210mm;
  min-height:297mm;
  margin:auto;
  padding:20mm 15mm;
  background:white;
}

/* header */
h2{
  text-align:center;
  margin-bottom:4px;
}

.date{
  text-align:center;
  margin-bottom:20px;
  font-size:14px;
  color:#555;
}

/* table */
table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}

th, td{
  border:1px solid #000;
  padding:6px;
  text-align:center;
}

th{
  background:#f3f4f6;
  font-weight:600;
}

tbody tr:hover{
  background:#f9fafb;
}

/* total row */
.total{
  background:#fde68a;
  font-weight:bold;
}

/* summary */
.summary{
  margin-top:16px;
  font-size:14px;
  line-height:1.6;
}

/* footer */
.footer{
  margin-top:40px;
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:40px;
  text-align:center;
  font-size:14px;
}

/* print */
@media print{
  body{
    background:white;
  }

  .report{
    box-shadow:none;
    margin:0;
  }

  button{
    display:none;
  }

  @page{
    size:A4;
    margin:15mm;
  }
}
</style>
</head>

<body>

<div class="report" id="report">

<h2>รายงานสถิตินักเรียนประจำวัน</h2>
<div class="date" id="dateText"></div>

<table>
<thead>
<tr>
<th>ชั้น</th>
<th>นักเรียนทั้งหมด</th>
<th>มาเรียน</th>
<th>ป่วย</th>
<th>ลา</th>
<th>ขาด</th>
</tr>
</thead>

<tbody id="dataBody"></tbody>
</table>

<div class="summary" id="summary"></div>

<div class="footer">
<div>ลงชื่อ....................................ครูเวรประจำวัน</div>
<div>ลงชื่อ............................ผช.ผอ.ฝ่ายบริหารทั่วไป</div>
<div>ลงชื่อ............................รองผู้อำนวยการสถานศึกษา</div>
<div>ลงชื่อ.............................ผู้อำนวยการสถานศึกษา</div>
</div>

</div>

<br>
<div style="text-align:center">
<button onclick="exportPDF()">ดาวน์โหลด PDF</button>
<button onclick="window.print()">พิมพ์เอกสาร</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>

const API="https://script.google.com/macros/s/AKfycbzwmS_Aip0yJ-vQgQhGZ7c58MkeHHMH2zpy5lC_3SLLDDAaPMD-wrUdGkp5QXLhgomp9g/exec"

const params = new URLSearchParams(location.search)
const date = params.get("date")

function formatThaiDate(dateStr){
  const d = new Date(dateStr)
  return d.toLocaleDateString('th-TH',{
    weekday:'long',
    year:'numeric',
    month:'long',
    day:'numeric'
  })
}

document.getElementById("dateText").innerText = formatThaiDate(date)

async function loadReport(){

const res = await fetch(API + "?mode=report&date=" + date)
const data = await res.json()

let html=""

let totalAll = 0
let totalPresent = 0

data.forEach(r=>{

const total = Number(r.total) || 0
const present = Number(r.present) || 0
const sick = r.sick ? Number(r.sick) : ""
const leave = r.leave ? Number(r.leave) : ""
const absent = r.absent ? Number(r.absent) : ""

totalAll += total
totalPresent += present

html += `
<tr>
<td>${r.room}</td>
<td>${total}</td>
<td>${present}</td>
<td>${sick}</td>
<td>${leave}</td>
<td>${absent}</td>
</tr>
`
})

const percent = totalAll ? ((totalPresent/totalAll)*100).toFixed(2) : 0

document.getElementById("summary").innerHTML = `
นักเรียนทั้งหมด ${totalAll} คน<br>
มาเรียน ${totalPresent} คน<br>
คิดเป็น ${percent}%
`

document.getElementById("dataBody").innerHTML = html
}

loadReport()

function exportPDF(){

const element = document.getElementById("report")

html2pdf().set({
  margin:0,
  filename:'report-'+date+'.pdf',
  html2canvas:{ scale:2 },
  jsPDF:{ unit:'mm', format:'a4', orientation:'portrait' }
})
.from(element)
.save()

}

</script>
</body>
</html>
