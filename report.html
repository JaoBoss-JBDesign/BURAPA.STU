<script>

let isLoaded = false
  
const API="https://script.google.com/macros/s/AKfycbzwmS_Aip0yJ-vQgQhGZ7c58MkeHHMH2zpy5lC_3SLLDDAaPMD-wrUdGkp5QXLhgomp9g/exec"

const params = new URLSearchParams(location.search)
const date = params.get("date") || new Date().toISOString().split("T")[0]
  
async function downloadPDF(){
  
  if(!isLoaded){
    alert("โปรดรอสักครู่...")
    return
  }

  const loadingEl = document.getElementById("loading")

  try{
    loadingEl.style.display = "flex"
    loadingEl.innerHTML = "กำลังสร้าง PDF...<br><small>โปรดรอสักครู่</small>"

    const element = document.getElementById("report")

    await document.fonts.ready
    await new Promise(r => setTimeout(r, 200))
    element.style.width = "210mm"

    const canvas = await html2canvas(element, {
      scale: 2,
      useCORS: true,
      letterRendering: true,
      backgroundColor: "#ffffff"
    })

    const { jsPDF } = window.jspdf
    const pdf = new jsPDF("p", "mm", "a4")

    const margin = 12
    const imgWidth = 210 - (margin * 2)
    const pageHeight = 297
    const imgHeight = canvas.height * imgWidth / canvas.width

    const pageHeightPx = canvas.height * (pageHeight / imgHeight)

    let renderedHeight = 0

    while (renderedHeight < canvas.height) {

      const pageCanvas = document.createElement("canvas")
      const pageCtx = pageCanvas.getContext("2d")

      pageCanvas.width = canvas.width
      const safePadding = 10
      pageCanvas.height = pageHeightPx - safePadding

      pageCtx.fillStyle = "#ffffff"
      pageCtx.fillRect(0, 0, pageCanvas.width, pageCanvas.height)

      pageCtx.drawImage(
        canvas,
        0, renderedHeight,
        canvas.width, pageHeightPx,
        0, 0,
        canvas.width, pageHeightPx
      )

      const imgDataPage = pageCanvas.toDataURL("image/png")

      if (renderedHeight > 0) pdf.addPage()

      pdf.addImage(imgDataPage, "PNG", margin, margin, imgWidth, pageHeight - (margin * 2) - 2)

      renderedHeight += pageCanvas.height
    }

    const fileDate = formatFileDate(date)
    pdf.save(`burapa-stu-${fileDate}.pdf`)

  }catch(e){
    alert("สร้าง PDF ไม่สำเร็จ")
    console.error(e)

  } finally {
    loadingEl.style.display = "none"
  }
}

if(!date){
  document.getElementById("dateText").innerText = "-"
}else{
  document.getElementById("dateText").innerHTML = formatThaiDate(date)
}

function formatFileDate(dateStr){
  const d = new Date(dateStr)

  const day = d.getDate().toString().padStart(2,"0")
  const month = (d.getMonth()+1).toString().padStart(2,"0")
  const year = d.getFullYear() + 543

  return `${day}-${month}-${year}`
}
  
function formatThaiDate(dateStr){
  const d = new Date(dateStr)

  const day = d.toLocaleDateString('th-TH',{ weekday:'long' }).replace("วัน","")
  const dNum = d.getDate()
  const month = d.toLocaleDateString('th-TH',{ month:'long' })
  const year = d.getFullYear() + 543

  return `
  วัน&nbsp;&nbsp;&nbsp;&nbsp;${day}
  &nbsp;&nbsp;&nbsp;&nbsp;ที่&nbsp;&nbsp;&nbsp;&nbsp;${dNum}
  &nbsp;&nbsp;&nbsp;&nbsp;เดือน&nbsp;&nbsp;&nbsp;&nbsp;${month}
  &nbsp;&nbsp;&nbsp;&nbsp;พ.ศ.&nbsp;&nbsp;&nbsp;&nbsp;${year}
  `
}

document.getElementById("loading").innerText = "กำลังโหลดข้อมูล..."
  
async function fetchWithFallback(dateStr){

  let d = new Date(dateStr)

  for(let i=0;i<365;i++){ // 🔥 ย้อนสูงสุด 1 ปี (แทบไม่มีพลาดแล้ว)
    
    const tryDate = d.toISOString().split("T")[0]

    try{
      const res = await fetch(API + "?mode=report&date=" + tryDate)
      const data = await res.json()

      if(data && data.length > 0){
        return { data, fallbackDate: tryDate }
      }

    }catch(e){}

    d.setDate(d.getDate()-1)
  }

  return { data:[], fallbackDate:null }
}
  
async function loadReport(){

let data = []
let isFallback = false

try{
  const result = await fetchWithFallback(date)
  data = result.data
  isFallback = result.fallbackDate !== date

if(data.length === 0){
  document.getElementById("dataBody").innerHTML = `
    <tr><td colspan="10">ไม่พบข้อมูล</td></tr>
  `
  document.getElementById("loading").style.display = "none"
  return
}

}catch(e){
  alert("โหลดข้อมูลไม่สำเร็จ")
  document.getElementById("loading").style.display = "none"
  return
}

let html=""
  
document.getElementById("loading").innerText = "กำลังสร้างรายงาน..."
document.getElementById("dataBody").innerHTML = `<tr><td colspan="10">กำลังสร้าง Report...</td></tr>`;

// รวมระดับ
let levels = {}

let totalAll = 0
let totalMale = 0
let totalFemale = 0

let totalPresent = 0
let totalPresentMale = 0
let totalPresentFemale = 0

let totalSick = 0
let totalLeave = 0
let totalAbsent = 0
  
data.forEach(r=>{

const level = getLevel(r.room)

// init level
if(!levels[level]){
levels[level] = {
  rows:[],
  total:0,
  male:0,
  female:0,
  present:0,
  presentMale:0,
  presentFemale:0,
  sick:0,
  leave:0,
  absent:0
}
}

const total = Number(r.total)||0
const male = Number(r.male)||0
const female = Number(r.female)||0

const present = isFallback ? "" : Number(r.present)||0
const presentMale = isFallback ? 0 : Number(r.present_m)||0
const presentFemale = isFallback ? 0 : Number(r.present_f)||0

const sick = isFallback ? "" : (r.sick||"")
const leave = isFallback ? "" : (r.leave||"")
const absent = isFallback ? "" : (r.absent||"")

// push row
levels[level].rows.push({
  room:r.room,
  total,male,female,
  present,presentMale,presentFemale,
  sick,leave,absent
})

// sum level
levels[level].total += total
levels[level].male += male
levels[level].female += female

levels[level].present += present
levels[level].presentMale += presentMale
levels[level].presentFemale += presentFemale
levels[level].sick += Number(sick)||0
levels[level].leave += Number(leave)||0
levels[level].absent += Number(absent)||0
  
// sum global
totalAll += total
totalMale += male
totalFemale += female

totalPresent += present
totalPresentMale += presentMale
totalPresentFemale += presentFemale

totalSick += Number(sick)||0
totalLeave += Number(leave)||0
totalAbsent += Number(absent)||0
})

let groupSum = {
  "ป.": {male:0,female:0,total:0,presentMale:0,presentFemale:0,present:0, sick:0, leave:0, absent:0},
  "ม.": {male:0,female:0,total:0,presentMale:0,presentFemale:0,present:0, sick:0, leave:0, absent:0},
  "ปวช": {male:0,female:0,total:0,presentMale:0,presentFemale:0,present:0, sick:0, leave:0, absent:0}
}
  
// 🔥 เรียงลำดับ
const order = ["ป.1","ป.2","ป.3","ป.4","ป.5","ป.6","ม.1","ม.2","ม.3","ม.4","ม.5","ม.6","ปวช.1","ปวช.2","ปวช.3"]

order.forEach(level=>{

let groupKey = ""

if(level.startsWith("ป.")) groupKey = "ป."
else if(level.startsWith("ม.")) groupKey = "ม."
else if(level.startsWith("ปวช")) groupKey = "ปวช"

if(groupKey && levels[level]){
  groupSum[groupKey].male += levels[level].male
  groupSum[groupKey].female += levels[level].female
  groupSum[groupKey].total += levels[level].total

  groupSum[groupKey].presentMale += levels[level].presentMale
  groupSum[groupKey].presentFemale += levels[level].presentFemale
  groupSum[groupKey].present += levels[level].present

  groupSum[groupKey].sick += levels[level].sick
groupSum[groupKey].leave += levels[level].leave
groupSum[groupKey].absent += levels[level].absent
}
  
if(!levels[level]) return
  
levels[level].rows.sort((a,b)=>{

  const numA = a.room.match(/\d+/g)
  const numB = b.room.match(/\d+/g)

  if(!numA || !numB) return 0

  // เทียบเลขหลักแรก (เช่น 6)
  if(numA[0] != numB[0]){
    return Number(numA[0]) - Number(numB[0])
  }

  // เทียบเลขหลัง / (เช่น /1 /2)
  return (Number(numA[1]||0)) - (Number(numB[1]||0))
})
  
levels[level].rows.forEach(r=>{
  
html += `
<tr>
<td>${r.room}</td>

<td>${r.male}</td>
<td>${r.female}</td>
<td>${r.total}</td>

<td>${r.presentMale}</td>
<td>${r.presentFemale}</td>
<td>${r.present}</td>

<td>${r.sick}</td>
<td>${r.leave}</td>
<td>${r.absent}</td>
</tr>
`
})

let colorClass = ""

if(level.startsWith("ป.")){
  colorClass = "primary"
}else if(level.startsWith("ม.") || level.startsWith("ปวช")){
  colorClass = "secondary"
}
  
html += `
<tr class="sum-row ${colorClass}">
<td>รวม ${level}</td>

<td>${levels[level].male}</td>
<td>${levels[level].female}</td>
<td>${levels[level].total}</td>

<td>${levels[level].presentMale}</td>
<td>${levels[level].presentFemale}</td>
<td>${levels[level].present}</td>

<td>${levels[level].sick}</td>
<td>${levels[level].leave}</td>
<td>${levels[level].absent}</td>
</tr>
`
  
if(level === "ป.6"){
  html += `
  <tr class="sum-row primary section-break">
  <td>รวมประถมทั้งหมด</td>
  <td>${groupSum["ป."].male}</td>
  <td>${groupSum["ป."].female}</td>
  <td>${groupSum["ป."].total}</td>
  <td>${groupSum["ป."].presentMale}</td>
  <td>${groupSum["ป."].presentFemale}</td>
  <td>${groupSum["ป."].present}</td>
  <td>${groupSum["ป."].sick}</td>

if(level === "ม.6"){

  <td>${groupSum["ม."].total}</td>
  <td>${groupSum["ม."].presentMale}</td>
  <td>${groupSum["ม."].presentFemale}</td>
  <td>${groupSum["ม."].present}</td>
  <td>${groupSum["ม."].sick}</td>
  <td>${groupSum["ม."].leave}</td>
  <td>${groupSum["ม."].absent}</td>
  </tr>
  `
}

if(level === "ปวช.3"){
  html += `
  <tr class="sum-row secondary section-break">
  <td>รวม ปวช ทั้งหมด</td>
  <td>${groupSum["ปวช"].male}</td>
  <td>${groupSum["ปวช"].female}</td>
  <td>${groupSum["ปวช"].total}</td>
  <td>${groupSum["ปวช"].presentMale}</td>
  <td>${groupSum["ปวช"].presentFemale}</td>
  <td>${groupSum["ปวช"].present}</td>
  <td>${groupSum["ปวช"].sick}</td>
  <td>${groupSum["ปวช"].leave}</td>
  <td>${groupSum["ปวช"].absent}</td>
  </tr>
  `
}
  
})
  
html += `
<tr class="sum-row total-all">
<td>รวมทั้งหมด</td>

<td>${totalMale}</td>
<td>${totalFemale}</td>
<td>${totalAll}</td>

<td>${totalPresentMale}</td>
<td>${totalPresentFemale}</td>
<td>${totalPresent}</td>

<td>${totalSick}</td>
<td>${totalLeave}</td>
<td>${totalAbsent}</td>
</tr>
`

document.getElementById("dataBody").innerHTML = html;

// 🔥 summary ใหม่
const percent = totalAll ? ((totalPresent/totalAll)*100).toFixed(2) : 0
const malePercent = totalMale ? ((totalPresentMale/totalMale)*100).toFixed(2) : 0
const femalePercent = totalFemale ? ((totalPresentFemale/totalFemale)*100).toFixed(2) : 0

document.getElementById("summary").innerHTML = `
จำนวนนักเรียนทั้งหมด&nbsp;&nbsp;&nbsp;${totalAll}&nbsp;&nbsp;&nbsp;คน
&nbsp;&nbsp;&nbsp;&nbsp;ชาย&nbsp;&nbsp;&nbsp;${totalMale}&nbsp;&nbsp;&nbsp;คน
&nbsp;&nbsp;&nbsp;&nbsp;หญิง&nbsp;&nbsp;&nbsp;${totalFemale}&nbsp;&nbsp;&nbsp;คน
<br>
จำนวนนักเรียนมาเรียนวันนี้&nbsp;&nbsp;&nbsp;${totalPresent}&nbsp;&nbsp;&nbsp;คน
&nbsp;&nbsp;&nbsp;&nbsp;ชาย&nbsp;&nbsp;&nbsp;${totalPresentMale}&nbsp;&nbsp;&nbsp;คน
&nbsp;&nbsp;&nbsp;&nbsp;หญิง&nbsp;&nbsp;&nbsp;${totalPresentFemale}&nbsp;&nbsp;&nbsp;คน
<br>
ชาย&nbsp;&nbsp;คิดเป็นร้อยละ&nbsp;&nbsp;${malePercent}
&nbsp;&nbsp;&nbsp;&nbsp;หญิง&nbsp;&nbsp;คิดเป็นร้อยละ&nbsp;&nbsp;${femalePercent}
<br>
นักเรียนมาเรียนวันนี้&nbsp;&nbsp;คิดเป็นร้อยละ&nbsp;&nbsp;${percent}
`

document.getElementById("loading").style.display = "none"

isLoaded = true
  
}

function getLevel(room){

  if(!room) return "อื่นๆ"

  room = room.trim()

  // 🔥 ป.1 / ป.1/1 / ประถมศึกษาปีที่ 1
  let match = room.match(/ป\.?\s*(\d+)/)
  if(match) return "ป." + match[1]

  if(room.includes("ประถม")){
    match = room.match(/\d+/)
    if(match) return "ป." + match[0]
  }

  // 🔥 ม.1 / ม.1/2 / มัธยมศึกษาปีที่ 1
  match = room.match(/ม\.?\s*(\d+)/)
  if(match) return "ม." + match[1]

  if(room.includes("มัธยม")){
    match = room.match(/\d+/)
    if(match) return "ม." + match[0]
  }

  // 🔥 ปวช
  match = room.match(/ปวช\.?\s*(\d+)/)
  if(match) return "ปวช." + match[1]

  if(room.includes("ชั้นประกาศนียบัตรวิชาชีพ")){
    match = room.match(/\d+/)
    if(match) return "ปวช." + match[0]
  }

  return "อื่นๆ"
}

async function loadSignatureToReport(){

try{

const res = await fetch(API + "?mode=getsigconfig")
