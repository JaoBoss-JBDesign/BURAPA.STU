<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BURAPA STUDENT SYSTEM</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Prompt',sans-serif;
}

body{
background:#f6f7fb;
color:#222;
overflow-x:hidden;
}

/* LOADER */

#loader{
position:fixed;
width:100%;
height:100%;
background:white;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.spinner{
width:50px;
height:50px;
border:5px solid #eee;
border-top:5px solid #4caf50;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* HEADER */

header{
background:white;
border-bottom:1px solid #eee;
padding:14px 20px;
display:flex;
align-items:center;
justify-content:space-between;
flex-wrap:wrap;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
width:40px;
}

.logo h1{
font-size:18px;
font-weight:600;
}

.back-btn{
border:1px solid #ccc;
padding:6px 12px;
border-radius:6px;
text-decoration:none;
color:#333;
font-size:14px;
}

.back-btn:hover{
background:#f2f2f2;
}

/* CONTAINER */

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

/* WELCOME */

.welcome{
margin-bottom:20px;
font-size:18px;
font-weight:500;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

/* STATS */

.stats{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:15px;
margin-bottom:30px;
}

.card{
background:white;
border-radius:12px;
padding:16px;
box-shadow:0 2px 6px rgba(0,0,0,0.05);
text-align:center;
}

.card h3{
font-size:14px;
color:#666;
margin-bottom:5px;
}

.card p{
font-size:22px;
font-weight:600;
}

/* GRAPH */

.graph{
background:white;
border-radius:12px;
padding:20px;
margin-bottom:30px;
text-align:center;
}

canvas{
max-width:260px;
margin:auto;
}

/* CLASSROOM */

.rooms{
background:white;
border-radius:12px;
padding:20px;
}

.room{
border-bottom:1px solid #eee;
padding:12px 0;
display:flex;
align-items:center;
justify-content:space-between;
flex-wrap:wrap;
}

.room-name{
font-size:15px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
max-width:50%;
}

.status{
font-size:13px;
padding:4px 10px;
border-radius:20px;
}

.saved{
background:#d4edda;
color:#1b5e20;
}

.notyet{
background:#ffebee;
color:#c62828;
}

.btns{
display:flex;
gap:6px;
flex-wrap:wrap;
}

.btn{
padding:5px 10px;
border-radius:6px;
font-size:12px;
text-decoration:none;
color:white;
}

.red{
background:#e53935;
}

.yellow{
background:#fbc02d;
color:black;
}

.gray{
background:#777;
}

/* MOBILE */

@media(max-width:768px){

.stats{
grid-template-columns:1fr;
}

.room{
flex-direction:column;
align-items:flex-start;
gap:8px;
}

.room-name{
max-width:100%;
}

}

</style>
</head>

<body>

<div id="loader">
<div class="spinner"></div>
</div>

<header>

<div class="logo">
<img src="logo.png">
<h1>BURAPA STUDENT SYSTEM</h1>
</div>

<a class="back-btn" href="index.html">กลับหน้าแรก</a>

</header>

<div class="container">

<div class="welcome">
ยินดีต้อนรับเข้าสู่หน้า Dashboard ระบบบริหารจัดการสถิตินักเรียน
</div>

<div class="stats">

<div class="card">
<h3>นักเรียนทั้งหมด</h3>
<p id="totalStu">0</p>
</div>

<div class="card">
<h3>มาเรียน</h3>
<p id="present">0</p>
</div>

<div class="card">
<h3>ป่วย</h3>
<p id="sick">0</p>
</div>

<div class="card">
<h3>ลา</h3>
<p id="leave">0</p>
</div>

<div class="card">
<h3>ขาด</h3>
<p id="absent">0</p>
</div>

</div>

<div class="graph">

<canvas id="chart"></canvas>

<div id="nodata">ยังไม่มีการบันทึกข้อมูล</div>

</div>

<div class="rooms">

<h3 style="margin-bottom:10px">ห้องเรียนทั้งหมด</h3>

<div id="roomList"></div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const API="PASTE_WEBAPP_URL";

setTimeout(()=>{
document.getElementById("loader").style.display="none";
},1000);

/* LOAD CLASSROOM */

fetch(API+"?mode=getclassrooms")
.then(r=>r.json())
.then(data=>{

let html="";

data.forEach((room,i)=>{

html+=`
<div class="room">

<div class="room-name">${room}</div>

<div class="status notyet">ยังไม่บันทึก</div>

<div class="btns">

<a class="btn red" href="statistic.html?room=${encodeURIComponent(room)}">บันทึกสถิติ</a>

<a class="btn yellow" href="#">แก้ไขสถิติ</a>

<a class="btn gray" href="#">ย้อนหลัง</a>

</div>

</div>
`;

});

document.getElementById("roomList").innerHTML=html;

});

/* GRAPH */

const ctx=document.getElementById('chart');

new Chart(ctx,{
type:'doughnut',
data:{
labels:['มาเรียน','ป่วย','ลา','ขาด'],
datasets:[{
data:[0,0,0,0],
backgroundColor:[
'#a5d6a7',
'#f8bbd0',
'#fff59d',
'#ffcc80'
]
}]
},
options:{
plugins:{
legend:{position:'bottom'}
}
}
});

</script>

</body>
</html>
