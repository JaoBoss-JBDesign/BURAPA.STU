<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BURAPA STUDENT SYSTEM</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Prompt',sans-serif;
}

body{
background:#f5f6fa;
color:#222;
overflow-x:hidden;
}

/* LOADER */

#loader{
position:fixed;
width:100%;
height:100%;
background:white;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.spinner{
width:45px;
height:45px;
border:5px solid #eee;
border-top:5px solid #66bb6a;
border-radius:50%;
animation:spin 0.8s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

/* HEADER */

header{
background:white;
padding:14px 20px;
border-bottom:1px solid #eee;
display:flex;
align-items:center;
justify-content:space-between;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
width:40px;
}

.logo span{
font-weight:600;
font-size:18px;
}

.backbtn{
border:1px solid #ccc;
padding:6px 12px;
border-radius:6px;
font-size:14px;
text-decoration:none;
color:#333;
}

.backbtn:hover{
background:#f0f0f0;
}

/* CONTAINER */

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

/* WELCOME */

.welcome{
font-size:17px;
font-weight:500;
margin-bottom:20px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:12px;
margin-bottom:25px;
}

.card{
background:white;
border-radius:10px;
padding:14px;
text-align:center;
box-shadow:0 2px 5px rgba(0,0,0,0.05);
}

.card h3{
font-size:13px;
color:#777;
margin-bottom:4px;
}

.card p{
font-size:20px;
font-weight:600;
}

/* GRAPH */

.graphbox{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:25px;
text-align:center;
}

canvas{
max-width:260px;
margin:auto;
}

/* ROOMS */

.rooms{
background:white;
padding:20px;
border-radius:10px;
}

.room{
border-bottom:1px solid #eee;
padding:12px 0;
display:flex;
align-items:center;
justify-content:space-between;
flex-wrap:wrap;
}

.roomname{
font-size:15px;
max-width:45%;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.status{
font-size:12px;
padding:4px 10px;
border-radius:20px;
}

.saved{
background:#c8e6c9;
color:#1b5e20;
}

.notyet{
background:#ffcdd2;
color:#b71c1c;
}

.btns{
display:flex;
gap:6px;
flex-wrap:wrap;
}

.btn{
padding:5px 10px;
font-size:12px;
border-radius:6px;
text-decoration:none;
color:white;
}

.red{
background:#e53935;
}

.edit{
background:#fff3b0;
color:#444;
}

.gray{
background:#777;
}

/* MOBILE */

@media(max-width:768px){

.cards{
grid-template-columns:1fr;
}

.room{
flex-direction:column;
align-items:flex-start;
gap:6px;
}

.roomname{
max-width:100%;
}

}

</style>
</head>

<body>

<div id="loader">
<div class="spinner"></div>
</div>

<header>

<div class="logo">
<img src="logo.png">
<span>BURAPA STUDENT SYSTEM</span>
</div>

<a class="backbtn" href="index.html">กลับหน้าแรก</a>

</header>

<div class="container">

<div class="welcome">
ยินดีต้อนรับเข้าสู่หน้า Dashboard ระบบบริหารจัดการสถิตินักเรียน
</div>

<div class="cards">

<div class="card">
<h3>นักเรียนทั้งหมด</h3>
<p>0</p>
</div>

<div class="card">
<h3>มาเรียน</h3>
<p>0</p>
</div>

<div class="card">
<h3>ป่วย</h3>
<p>0</p>
</div>

<div class="card">
<h3>ลา</h3>
<p>0</p>
</div>

<div class="card">
<h3>ขาด</h3>
<p>0</p>
</div>

</div>

<div class="graphbox">

<canvas id="chart"></canvas>

</div>

<div class="rooms">

<h3 style="margin-bottom:10px">ห้องเรียนทั้งหมด</h3>

<div id="roomlist"></div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const API="ใส่URLWebApp";

setTimeout(()=>{
document.getElementById("loader").style.display="none";
},1000);

/* GRAPH */

const ctx=document.getElementById('chart');

new Chart(ctx,{
type:'doughnut',
data:{
labels:['มาเรียน','ป่วย','ลา','ขาด'],
datasets:[{
data:[1,1,1,1],
backgroundColor:[
'#a5d6a7',
'#f8bbd0',
'#fff59d',
'#ffcc80'
]
}]
},
options:{
plugins:{
legend:{position:'bottom'}
}
}
});

/* CLASSROOM */

fetch(API+"?mode=getclassrooms")
.then(r=>r.json())
.then(data=>{

let html="";

data.forEach(room=>{

html+=`
<div class="room">

<div class="roomname">${room}</div>

<div class="status notyet">ยังไม่บันทึก</div>

<div class="btns">

<a class="btn red" href="statistic.html?room=${encodeURIComponent(room)}">บันทึกสถิติ</a>

<a class="btn edit" href="#">แก้ไขสถิติ</a>

<a class="btn gray" href="#">ย้อนหลัง</a>

</div>

</div>
`;

});

document.getElementById("roomlist").innerHTML=html;

});

</script>

</body>
</html>
