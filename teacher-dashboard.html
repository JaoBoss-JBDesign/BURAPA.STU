<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Prompt',sans-serif;
}

body{
min-height:100vh;
display:flex;
flex-direction:column;
background:linear-gradient(180deg,#f6f7fb,#eef1f8);
}

header{

background:linear-gradient(135deg,#c1121f,#e63946,#ff6b6b);
background-size:200% 200%;

animation:gradientMove 6s ease infinite;

border-bottom:4px solid rgba(255,255,255,0.25);

color:white;
text-align:center;

padding:22px 10px;

box-shadow:0 10px 25px rgba(0,0,0,.15);

position:relative;
overflow:hidden;

z-index:1;

backdrop-filter: blur(2px);

}

header::before{
content:"";
position:absolute;
top:0;
left:0;
width:200%;
height:100%;
background:
radial-gradient(rgba(255,255,255,.12) 2px, transparent 2px);
background-size:40px 40px;
animation:dotsMove 30s linear infinite;
opacity:.35;
pointer-events:none;
}

header::after{
content:"";
position:absolute;
top:0;
left:-120%;
width:240%;
height:100%;

background:linear-gradient(
120deg,
rgba(255,255,255,0) 0%,
rgba(255,255,255,.25) 40%,
rgba(255,255,255,.35) 50%,
rgba(255,255,255,.25) 60%,
rgba(255,255,255,0) 100%
);

filter:blur(28px);

animation:shine 6s linear infinite;

pointer-events:none;
}

@keyframes gradientMove{

0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}

}

@keyframes dotsMove{

0%{transform:translateX(0)}
100%{transform:translateX(-400px)}

}

@keyframes shine{

0%{transform:translateX(-100%)}
100%{transform:translateX(100%)}

}
  
.logo{

width:clamp(80px,16vw,110px);
margin-bottom:4px;

animation:float 4s ease-in-out infinite;

filter:
drop-shadow(0 8px 14px rgba(0,0,0,.3))
drop-shadow(0 0 25px rgba(255,255,255,.35));

}

@keyframes float{

0%{transform:translateY(0)}
50%{transform:translateY(-6px)}
100%{transform:translateY(0)}

}
  
.system-name{font-size:13px;}
.school-name{font-size:26px;font-weight:700;}

.back{
position:absolute;
left:12px;
top:12px;
color:white;
text-decoration:none;
font-size:13px;
background:rgba(255,255,255,.2);
padding:6px 10px;
border-radius:8px;
}

main{
flex:1;
max-width:1100px;
margin:auto;
padding:16px;
width:100%;
}

.stats{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:12px;
margin-bottom:16px;
}

.stat{
background:white;
padding:14px;
border-radius:16px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.stat h3{font-size:12px;color:#666;}

.num{
font-size:22px;
font-weight:700;
margin-top:4px;
}

.present{color:#6BCB77}
.sick{color:#ff8fab}
.leave{color:#ffd166}
.absent{color:#f28482}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

.card{
background:white;
border-radius:18px;
padding:16px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
height:420px;
display:flex;
flex-direction:column;
}

.chartBox{
display:flex;
align-items:center;
justify-content:center;
height:100%;
}

.chartBox canvas{
max-width:280px;
max-height:280px;
}

#classList{
flex:1;
overflow-y:auto;
margin-top:8px;
}

.class{
padding:10px 0;
border-bottom:1px solid #eee;
}

.class-top{
display:flex;
justify-content:space-between;
font-size:14px;
}

.status{font-size:12px;font-weight:600;}
.green{color:#6BCB77;}
.red{color:#e63946;}

.buttons{
margin-top:6px;
display:flex;
gap:6px;
flex-wrap:wrap;
}

button{
border:none;
padding:6px 10px;
border-radius:8px;
font-size:12px;
cursor:pointer;
}

.btn-edit{background:#ffd166;}
.btn-main{background:#e63946;color:white;}
.btn-sub{background:#eef1f6;}

footer{
background:linear-gradient(135deg,#c1121f,#e63946,#ff6b6b);
color:white;
text-align:center;
font-size:10px;
padding:8px;
}

#loading{
position:fixed;
inset:0;
background:white;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:999;
transition:opacity .2s;
}

.loader{
width:45px;
height:45px;
border:4px solid #eee;
border-top:4px solid #e63946;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg)}
}

</style>
</head>

<body>

<div id="loading">
<div class="loader"></div>
<div style="margin-top:12px;font-size:14px;color:#555">
กำลังเปิด Dashboard...
</div>
</div>

<header>

<a class="back" onclick="location.href='index.html'">← กลับหน้าแรก</a>

<img src="burapa-logo.png" class="logo">

<div class="system-name">ระบบบริหารจัดการสถิตินักเรียน</div>
<div class="school-name">โรงเรียนเทศบาลบูรพาอุบล</div>

<div id="termDisplay"></div>
<div id="clock"></div>

</header>

<main>

<div class="stats">

<div class="stat">
<h3>นักเรียนทั้งหมด</h3>
<div class="num" id="total">0</div>
</div>

<div class="stat">
<h3>มาเรียน</h3>
<div class="num present" id="present">0</div>
</div>

<div class="stat">
<h3>ป่วย</h3>
<div class="num sick" id="sick">0</div>
</div>

<div class="stat">
<h3>ลา</h3>
<div class="num leave" id="leave">0</div>
</div>

<div class="stat">
<h3>ขาด</h3>
<div class="num absent" id="absent">0</div>
</div>

</div>

<div class="grid">

<div class="card">

<h3>แผนภูมิสรุปสถิติวันนี้</h3>

<div class="chartBox">
<canvas id="chart"></canvas>
</div>

</div>

<div class="card">

<h3>ห้องเรียน</h3>

<div id="classList"></div>

</div>

</div>

</main>

<footer>

ระบบบริหารจัดการสถิตินักเรียน (BURAPA STUDENT SYSTEM)<br>
ภาคเรียนที่ <span id="termFooter"></span><br>
โรงเรียนเทศบาลบูรพาอุบล

</footer>

<script>

function loadTerm(){

let term=localStorage.getItem("term")||"2"
let year=localStorage.getItem("year")||"2568"

document.getElementById("termDisplay").innerHTML=
"ภาคเรียนที่ "+term+" ปีการศึกษา "+year

document.getElementById("termFooter").innerHTML=
term+"/"+year

}

loadTerm()

const API="https://script.google.com/macros/s/AKfycbzwmS_Aip0yJ-vQgQhGZ7c58MkeHHMH2zpy5lC_3SLLDDAaPMD-wrUdGkp5QXLhgomp9g/exec"

let chartInstance=null
let loadingNow=false

async function load(){

if(loadingNow)return
loadingNow=true

try{

const res=await fetch(API+"?mode=getdashboard&t="+Date.now(),{cache:"no-store"})

if(!res.ok)throw new Error()

const dash=await res.json()

renderDash(dash)
renderRooms(dash.rooms||[])

}catch(e){

console.error(e)

renderDash({present:0,sick:0,leave:0,absent:0})
renderRooms([])

}

hideLoading()
loadingNow=false

}

function hideLoading(){

const loading=document.getElementById("loading")

loading.style.opacity="0"

setTimeout(()=>{
loading.style.display="none"
},300)

}

function renderDash(d){

let present=d.present||0
let sick=d.sick||0
let leave=d.leave||0
let absent=d.absent||0

let total=present+sick+leave+absent

document.getElementById("total").innerText=total
document.getElementById("present").innerText=present
document.getElementById("sick").innerText=sick
document.getElementById("leave").innerText=leave
document.getElementById("absent").innerText=absent

let data=total===0?[1]:[present,sick,leave,absent]

let labels=total===0
?["ยังไม่มีการบันทึกสถิติ"]
:["มาเรียน","ป่วย","ลา","ขาด"]

let colors=total===0
?["#d9d9d9"]
:["#6BCB77","#ff8fab","#ffd166","#f28482"]

let ctx=document.getElementById("chart")

if(chartInstance){

chartInstance.data.labels=labels
chartInstance.data.datasets[0].data=data
chartInstance.update()

}else{

chartInstance=new Chart(ctx,{
type:"pie",
data:{
labels:labels,
datasets:[{data:data,backgroundColor:colors}]
},
plugins:[ChartDataLabels],
options:{
plugins:{
legend:{position:"bottom"},
datalabels:{
color:"#fff",
font:{weight:"bold"},
formatter:(v,ctx)=>{
let sum=ctx.chart.data.datasets[0].data.reduce((a,b)=>a+b,0)
if(sum===0)return""
return Math.round(v/sum*100)+"%"
}
}
}
}
})

}

}

function renderRooms(rooms){

let html=""

rooms.forEach(r=>{

let status=r.submitted
?'<span class="status green">บันทึกแล้ว</span>'
:'<span class="status red">ยังไม่บันทึก</span>'

html+=`
<div class="class">

<div class="class-top">
<span>${r.room}</span>
${status}
</div>

<div class="buttons">

${r.submitted
?`<button class="btn-edit" onclick="location.href='form.html?room=${r.room}&edit=1'">แก้ไขสถิติวันนี้</button>`
:`<button class="btn-main" onclick="location.href='form.html?room=${r.room}'">บันทึกสถิติวันนี้</button>`
}

<button class="btn-sub" onclick="location.href='form.html?room=${r.room}&backdate=1'">
แก้ไขย้อนหลัง
</button>

</div>

</div>
`

})

document.getElementById("classList").innerHTML=html

}

load()

setInterval(load,60000)

function updateClock(){

let now=new Date()

let days=["วันอาทิตย์","วันจันทร์","วันอังคาร","วันพุธ","วันพฤหัสบดี","วันศุกร์","วันเสาร์"]
let months=["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"]

let day=days[now.getDay()]
let date=now.getDate()
let month=months[now.getMonth()]
let year=now.getFullYear()+543

let h=String(now.getHours()).padStart(2,"0")
let m=String(now.getMinutes()).padStart(2,"0")
let s=String(now.getSeconds()).padStart(2,"0")

document.getElementById("clock").innerHTML=
day+"ที่ "+date+" "+month+" พ.ศ."+year+" เวลา "+h+":"+m+":"+s+" น."

}

setInterval(updateClock,1000)
updateClock()

</script>

</body>
</html>
