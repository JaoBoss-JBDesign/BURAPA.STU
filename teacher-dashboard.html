<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teacher Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Prompt',sans-serif;
}

body{

min-height:100vh;
display:flex;
flex-direction:column;

background:
linear-gradient(180deg,#f6f7fb,#eef1f8),
radial-gradient(circle at 15% 20%, rgba(230,57,70,.08), transparent 40%),
radial-gradient(circle at 85% 80%, rgba(230,57,70,.06), transparent 40%);

}

/* HEADER */

header{

background:linear-gradient(135deg,#c1121f,#e63946,#ff6b6b);
color:white;
text-align:center;
padding:20px;

box-shadow:0 10px 25px rgba(0,0,0,.15);

}

.logo{
width:90px;
margin-bottom:4px;
}

.school-name{
font-size:24px;
font-weight:700;
}

.system-name{
font-size:13px;
}

.time{
font-size:12px;
margin-top:3px;
}

/* MAIN */

main{
flex:1;
padding:25px;
max-width:1100px;
margin:auto;
width:100%;
}

/* STATS */

.stats{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:18px;
margin-bottom:25px;

}

.stat-card{

background:white;
border-radius:16px;
padding:18px;

box-shadow:0 10px 25px rgba(0,0,0,.08);

text-align:center;

}

.stat-card h3{
font-size:14px;
color:#666;
margin-bottom:6px;
}

.stat-card .num{
font-size:26px;
font-weight:700;
color:#e63946;
}

/* GRID */

.grid{

display:grid;
grid-template-columns:1fr 1fr;
gap:20px;

}

@media(max-width:900px){
.grid{
grid-template-columns:1fr;
}
}

/* CARD */

.card{

background:white;
border-radius:18px;
padding:20px;

box-shadow:0 15px 40px rgba(0,0,0,.08);

}

.card h2{
font-size:16px;
margin-bottom:12px;
}

/* CLASS LIST */

.class-item{

display:flex;
justify-content:space-between;
align-items:center;

padding:10px 0;
border-bottom:1px solid #eee;

}

.class-item:last-child{
border:none;
}

.btn{

background:#e63946;
color:white;

border:none;
padding:6px 12px;

border-radius:8px;

cursor:pointer;

}

/* FOOTER */

footer{

background:linear-gradient(135deg,#c1121f,#e63946,#ff6b6b);
color:white;
text-align:center;
font-size:10px;
padding:8px;

}

/* LOADING */

#loading{

position:fixed;
inset:0;
background:white;

display:flex;
align-items:center;
justify-content:center;
flex-direction:column;

z-index:999;

}

.loader{

width:45px;
height:45px;

border:4px solid #eee;
border-top:4px solid #e63946;

border-radius:50%;

animation:spin 1s linear infinite;

}

@keyframes spin{
to{transform:rotate(360deg)}
}

</style>
</head>

<body>

<div id="loading">
<div class="loader"></div>
<div style="margin-top:10px">กำลังโหลด Dashboard...</div>
</div>

<header>

<img src="burapa-logo.png" class="logo">

<div class="system-name">
ระบบบริหารจัดการสถิตินักเรียน
</div>

<div class="school-name">
โรงเรียนเทศบาลบูรพาอุบล
</div>

<div class="time" id="clock"></div>

</header>

<main>

<div class="stats">

<div class="stat-card">
<h3>นักเรียนทั้งหมด</h3>
<div class="num">120</div>
</div>

<div class="stat-card">
<h3>มาเรียน</h3>
<div class="num">110</div>
</div>

<div class="stat-card">
<h3>ขาดเรียน</h3>
<div class="num">5</div>
</div>

<div class="stat-card">
<h3>ลา</h3>
<div class="num">5</div>
</div>

</div>

<div class="grid">

<div class="card">

<h2>สถิติการมาเรียน</h2>

<canvas id="chart"></canvas>

</div>

<div class="card">

<h2>ห้องเรียนของคุณ</h2>

<div class="class-item">
<span>ม.1/1</span>
<button class="btn">เปิด</button>
</div>

<div class="class-item">
<span>ม.1/2</span>
<button class="btn">เปิด</button>
</div>

<div class="class-item">
<span>ม.2/1</span>
<button class="btn">เปิด</button>
</div>

</div>

</div>

</main>

<footer>

ระบบบริหารจัดการสถิตินักเรียน (BURAPA.STUDENT)

<br>

โรงเรียนเทศบาลบูรพาอุบล

</footer>

<script>

setTimeout(()=>{
document.getElementById("loading").style.display="none"
},500)

function updateClock(){

let now=new Date()

let h=String(now.getHours()).padStart(2,"0")
let m=String(now.getMinutes()).padStart(2,"0")
let s=String(now.getSeconds()).padStart(2,"0")

document.getElementById("clock").innerHTML=
"เวลา "+h+":"+m+":"+s

}

setInterval(updateClock,1000)
updateClock()

const ctx=document.getElementById("chart")

new Chart(ctx,{
type:'pie',
data:{
labels:["มาเรียน","ขาด","ลา"],
datasets:[{
data:[110,5,5],
backgroundColor:[
"#4CAF50",
"#ff5252",
"#ffd166"
]
}]
}
})

</script>

</body>
</html>
