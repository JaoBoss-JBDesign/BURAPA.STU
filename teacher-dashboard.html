<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teacher Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Prompt',sans-serif;
}

body{
background:#f6f7fb;
overflow-x:hidden;
}

header{
background:#e63946;
color:white;
text-align:center;
padding:20px;
}

main{
max-width:1200px;
margin:auto;
padding:20px;
}

.summary{

display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;

}

.card{

background:white;
padding:20px;
border-radius:12px;

box-shadow:0 6px 20px rgba(0,0,0,.08);

}

.number{

font-size:26px;
font-weight:600;

}

.chart-box{

margin-top:25px;

background:white;

padding:20px;

border-radius:12px;

box-shadow:0 6px 20px rgba(0,0,0,.08);

}

#loading{

position:fixed;
inset:0;

background:white;

display:flex;
align-items:center;
justify-content:center;
flex-direction:column;

}

.loader{

width:40px;
height:40px;

border:4px solid #eee;
border-top:4px solid #e63946;

border-radius:50%;

animation:spin 1s linear infinite;

}

@keyframes spin{
to{transform:rotate(360deg)}
}

@media(max-width:768px){

.summary{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div id="loading">

<div class="loader"></div>

<div style="margin-top:10px">
กำลังเปิดระบบสำหรับคุณครูประจำชั้น โปรดรอสักครู่...
</div>

</div>

<header>

<h2>BURAPA STUDENT SYSTEM</h2>
<div>Teacher Dashboard</div>

</header>

<main>

<div class="summary">

<div class="card">
<h3>นักเรียนชาย</h3>
<div class="number" id="boys">0</div>
</div>

<div class="card">
<h3>นักเรียนหญิง</h3>
<div class="number" id="girls">0</div>
</div>

<div class="card">
<h3>ห้องที่บันทึก</h3>
<div class="number" id="done">0</div>
</div>

<div class="card">
<h3>ห้องที่ยังไม่บันทึก</h3>
<div class="number" id="left">0</div>
</div>

</div>

<div class="chart-box">

<h3 style="text-align:center;margin-bottom:10px">
สัดส่วนนักเรียน
</h3>

<canvas id="chart"></canvas>

</div>

</main>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbzwmS_Aip0yJ-vQgQhGZ7c58MkeHHMH2zpy5lC_3SLLDDAaPMD-wrUdGkp5QXLhgomp9g/exec"

let chart

async function load(){

let res = await fetch(API_URL+"?mode=getDashboard")

let data = await res.json()

document.getElementById("boys").innerHTML=data.totalMale
document.getElementById("girls").innerHTML=data.totalFemale

document.getElementById("done").innerHTML=data.submittedRooms
document.getElementById("left").innerHTML=data.totalRooms-data.submittedRooms

createChart(data.totalMale,data.totalFemale)

document.getElementById("loading").style.display="none"

}

function createChart(male,female){

if(chart){
chart.destroy()
}

chart=new Chart(

document.getElementById("chart"),

{
type:"pie",

data:{

labels:["ชาย","หญิง"],

datasets:[{

data:[male,female],

backgroundColor:[
"#3a86ff",
"#ff006e"
]

}]

}

}

)

}

load()

</script>

</body>
</html>
