<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Attendance Form</title>

<link rel="stylesheet" href="style.css">
<script src="script.js"></script>

</head>

<body>

<header>Attendance Form</header>

<div class="container">

<div class="card">

<div id="roomName"></div>

ชายทั้งหมด
<input type="number" id="all_boys" oninput="checkTotal()">

หญิงทั้งหมด
<input type="number" id="all_girls" oninput="checkTotal()">

<br><br>

<b>รวมทั้งหมด : <span id="total_all">0</span></b>

<br><br>

ชายมาวันนี้
<input type="number" id="boys_today" oninput="checkTotal()">

หญิงมาวันนี้
<input type="number" id="girls_today" oninput="checkTotal()">

ป่วย
<input type="number" id="sick" oninput="checkTotal()">

ลา
<input type="number" id="leave" oninput="checkTotal()">

ขาด
<input type="number" id="absent" oninput="checkTotal()">

<br><br>

<b>รวมสถานะวันนี้ : <span id="total_today">0</span></b>

<br><br>

<div id="warning" style="color:red;font-weight:bold"></div>

<button onclick="submitData()">บันทึกข้อมูล</button>

</div>

</div>

</body>
</html>
